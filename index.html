<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Lil Sauce</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/tile.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- Board -->
  <main class="board-section" id="board-container" aria-label="Split-flap message board">
  </main>

  <!-- Live region for screen reader announcements of message changes -->
  <div id="sr-announce" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <!-- Volume toggle -->
  <button class="volume-btn-corner" id="volume-btn" aria-label="Sound on" aria-pressed="false">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </svg>
  </button>

  <script type="module" src="js/main.js"></script>
</body>
</html>
